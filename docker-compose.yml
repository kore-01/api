# ============================================================================
#  AKDN — AI API Key Delivery Network
#  Docker Compose
#  https://github.com/Yorkian/AKDN
# ============================================================================

services:
  akdn:
    build: .
    container_name: akdn
    restart: unless-stopped
    ports:
      - "3060:3060"
    volumes:
      - akdn-data:/app/data
    environment:
      - PORT=3060
      - HOST=0.0.0.0
      - DB_PATH=/app/data/akdn.db
      # Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      # IMPORTANT: Set these before first run. Do not change after storing API keys.
      - AKDN_ENCRYPTION_KEY=${AKDN_ENCRYPTION_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-}
      # Optional
      - IPINFO_TOKEN=${IPINFO_TOKEN:-}
      - FIRST_TOKEN_TIMEOUT=${FIRST_TOKEN_TIMEOUT:-15000}
      - NON_STREAM_TIMEOUT=${NON_STREAM_TIMEOUT:-30000}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-60000}
      - GEO_CACHE_TTL=${GEO_CACHE_TTL:-604800000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3060/api/auth/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  akdn-data:
    driver: local
